{% extends "base.html" %}

{% block title %}Registro — TurnoYa{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-3">Crear cuenta</h1>
        <p class="text-muted">Base inicial común. Después el grupo puede extender este formulario con datos de paciente o médico.</p>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-success w-100">Registrarme</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
