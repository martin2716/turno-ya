{% extends "base.html" %}

{% block title %}Ingresar — TurnoYa{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-3">Ingresar</h1>
        <p class="text-muted">Base inicial del grupo. Esta pantalla se puede mejorar en la etapa de autenticación.</p>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-success w-100">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
