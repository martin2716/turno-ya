{% extends "base.html" %}

{% block title %}Error del servidor — TurnoYa{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-md-7 col-lg-5 text-center">
    <div class="card shadow-sm border-0">
      <div class="card-body p-5">
        <h1 class="display-1 fw-bold text-danger">500</h1>
        <h2 class="h4 mb-3">Error interno del servidor</h2>
        <p class="text-muted mb-4">Ocurrió un problema inesperado. Por favor intentá de nuevo en unos momentos.</p>
        <a href="{% url 'app:home' %}" class="btn btn-success">Volver al inicio</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
